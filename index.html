<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aurora | Student Management</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        :root {
            --glass-bg: rgba(255, 255, 255, 0.7);
            --glass-border: rgba(255, 255, 255, 0.3);
            --primary-grad: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            --text-main: #1e293b;
        }
        body {
            background: #f8faff;
            background-image: radial-gradient(at 0% 0%, rgba(102, 126, 234, 0.15) 0px, transparent 50%), 
                              radial-gradient(at 100% 100%, rgba(118, 75, 162, 0.15) 0px, transparent 50%);
            font-family: 'Outfit', sans-serif;
            color: var(--text-main);
            min-height: 100vh;
        }
        .glass-nav {
            background: var(--glass-bg); backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--glass-border); padding: 1rem 0;
            position: sticky; top: 0; z-index: 1000;
        }
        .brand-logo {
            font-weight: 800; font-size: 1.5rem; background: var(--primary-grad);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }
        .student-card {
            background: white; border: 1px solid #f1f5f9; border-radius: 24px;
            padding: 1.5rem; transition: all 0.3s ease;
        }
        .student-card:hover { transform: translateY(-10px); border-color: #667eea; }
        .avatar-circle {
            width: 56px; height: 56px; border-radius: 18px; background: #f1f5f9;
            display: flex; align-items: center; justify-content: center;
            font-size: 1.25rem; font-weight: 700; color: #64748b; margin-bottom: 1.25rem;
        }
        .badge-course {
            font-size: 0.7rem; font-weight: 700; text-transform: uppercase;
            padding: 5px 12px; border-radius: 100px; background: #f1f5f9; color: #475569;
        }
        .fab-add {
            position: fixed; bottom: 40px; right: 40px; width: 64px; height: 64px;
            border-radius: 50%; background: var(--primary-grad); color: white;
            display: flex; align-items: center; justify-content: center; font-size: 1.75rem;
            border: none; box-shadow: 0 10px 25px rgba(102, 126, 234, 0.4);
        }
    </style>
</head>
<body>

    <nav class="glass-nav mb-5">
        <div class="container d-flex justify-content-between align-items-center">
            <div class="brand-logo" onclick="showHome()" style="cursor: pointer;">AURORA</div>
        </div>
    </nav>

    <div class="container pb-5">
        <div id="list-section">
            <h1 class="fw-bold">Student Records</h1>
            <div class="row g-4 mt-2" id="student-grid"></div>
        </div>

        <div id="form-section" style="display: none;">
            <div class="row justify-content-center">
                <div class="col-md-7">
                    <div class="student-card shadow-sm p-5">
                        <h3 id="form-title" class="fw-bold mb-4 text-center">Registration</h3>
                        <form id="student-form" onsubmit="handleFormSubmit(event)">
                            <input type="hidden" id="db_id">
                            <div class="row g-3">
                                <div class="col-md-6"><label class="form-label">ID</label><input type="text" id="student_id" class="form-control" required></div>
                                <div class="col-md-6"><label class="form-label">Name</label><input type="text" id="full_name" class="form-control" required></div>
                                <div class="col-md-6"><label class="form-label">Course</label><input type="text" id="course" class="form-control" required></div>
                                <div class="col-md-6">
                                    <label class="form-label">Year</label>
                                    <select id="year_level" class="form-select">
                                        <option>1st Year</option><option>2nd Year</option><option>3rd Year</option><option>4th Year</option>
                                    </select>
                                </div>
                                <div class="col-12"><label class="form-label">Email</label><input type="email" id="email" class="form-control" required></div>
                            </div>
                            <div class="mt-4 d-flex gap-2">
                                <button type="submit" class="btn btn-dark w-100">Save</button>
                                <button type="button" class="btn btn-light w-100" onclick="showHome()">Cancel</button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <button class="fab-add" onclick="showForm()"><i class="bi bi-plus"></i></button>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <!-- CRITICAL: Path points up one level to find the JS in root -->
    <script src="/crud_final_exam.js"></script>
</body>
</html>
